name: Build Windows x86_64

on:
  workflow_call:
    inputs:
      version:
        description: "WSJT-X version string"
        required: true
        type: string
      hamlib_branch:
        description: "Hamlib branch to build"
        required: false
        type: string
        default: "4.7.0"

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          cache: true
          install: >-
            git make tar
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-gcc-fortran
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-qt5-base
            mingw-w64-x86_64-qt5-multimedia
            mingw-w64-x86_64-qt5-serialport
            mingw-w64-x86_64-qt5-tools
            mingw-w64-x86_64-qt5-websockets
            mingw-w64-x86_64-qt5-activeqt
            mingw-w64-x86_64-fftw
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-libusb
            mingw-w64-x86_64-portaudio
            mingw-w64-x86_64-pkg-config
            autoconf automake libtool

      - name: Cache Hamlib
        id: hamlib-cache
        uses: actions/cache@v4
        with:
          path: hamlib-prefix
          key: hamlib-windows-${{ inputs.hamlib_branch }}-${{ hashFiles('.github/workflows/build-windows.yml') }}

      - name: Build Hamlib
        if: steps.hamlib-cache.outputs.cache-hit != 'true'
        env:
          MSYS2_PATH_TYPE: inherit
        run: |
          WORKSPACE=$(cygpath "${GITHUB_WORKSPACE}")
          git clone --depth 1 --branch "${{ inputs.hamlib_branch }}" \
            https://github.com/Hamlib/Hamlib.git hamlib-src
          cd hamlib-src
          ./bootstrap
          ./configure \
            --prefix="${WORKSPACE}/hamlib-prefix" \
            --enable-shared --disable-static \
            --without-cxx-binding \
            --without-readline \
            CFLAGS="-DNDEBUG -g -O2 -fdata-sections -ffunction-sections" \
            LDFLAGS="-Wl,--gc-sections"
          make -j$(nproc)
          make install-strip

      - name: Patch Windows build for CI
        run: |
          # Two patches needed for CI:
          # 1. OmniRig: COM registration fails on runners (issue #4)
          # 2. MAP65: GCC 15 rejects legacy Fortran array dimensions in decode0.f90
          #    MAP65 is a separate EME app, not core WSJT-X. Skip it.
          sed -i 's/add_subdirectory (map65)/# add_subdirectory (map65)  # skipped: GCC 15 compat/' CMakeLists.txt

          # Create a stub OmniRig.h so the include chain doesn't break.
          # The real OmniRig.h is generated by dumpcpp from the COM type library.
          echo '// Stub — OmniRig COM type library not available in CI' > OmniRig.h
          echo 'namespace OmniRig { enum RigParamX { OnLine=0 }; struct OmniRigX {}; struct RigX {}; struct PortBits {}; }' >> OmniRig.h
          cp OmniRig.h Transceiver/OmniRig.h
          python3 -c "
          import re
          with open('CMakeLists.txt', 'r') as f:
              txt = f.read()
          # Replace the entire WIN32 OmniRig block (lines 933-950) with a skip
          txt = re.sub(
              r'if \(WIN32\)\s*\n\s*# generate the OmniRig COM interface source.*?endif \(\)',
              '''if (WIN32)
            # OmniRig skipped in CI — COM type library not available on GitHub Actions runners
            message (STATUS \"OmniRig support disabled (CI build)\")
            set (WSJT_SKIP_OMNIRIG ON)
          endif ()''',
              txt, count=1, flags=re.DOTALL)
          # Guard the wrap_ax_server call
          txt = txt.replace('wrap_ax_server (GENAXSRCS \${AXSERVERSRCS})',
              'if (NOT WSJT_SKIP_OMNIRIG)\n    wrap_ax_server (GENAXSRCS \${AXSERVERSRCS})\n  endif ()')
          # Guard the AxContainer link
          txt = txt.replace('target_link_libraries (wsjt_qt Qt5::AxContainer Qt5::AxBase)',
              'if (NOT WSJT_SKIP_OMNIRIG)\n    target_link_libraries (wsjt_qt Qt5::AxContainer Qt5::AxBase)\n  endif ()')
          # Remove OmniRigTransceiver.cpp from sources when skipped
          txt = txt.replace('Transceiver/OmniRigTransceiver.cpp',
              '\$<\$<NOT:\$<BOOL:\${WSJT_SKIP_OMNIRIG}>>:Transceiver/OmniRigTransceiver.cpp>')
          # Guard find_package(Qt5AxContainer)
          txt = txt.replace('find_package (Qt5AxContainer REQUIRED)',
              'if (NOT WSJT_SKIP_OMNIRIG)\n    find_package (Qt5AxContainer REQUIRED)\n  endif ()')
          # Add compile definition so C++ can guard OmniRig includes
          txt = txt.replace('set (WSJT_SKIP_OMNIRIG ON)',
              'set (WSJT_SKIP_OMNIRIG ON)\n  add_definitions(-DWSJT_SKIP_OMNIRIG)')
          with open('CMakeLists.txt', 'w') as f:
              f.write(txt)
          print('OmniRig patched out successfully')
          "

      - name: Configure
        run: |
          WORKSPACE=$(cygpath "${GITHUB_WORKSPACE}")
          # MSYS2 FFTW splits threads into a separate lib, but the WSJT-X
          # FindFFTW3.cmake assumes Windows bundles threads into the main lib.
          # Patch the module to include threads on Windows too.
          sed -i 's/if (NOT WIN32 AND _use_threads)/if (_use_threads)/' CMake/Modules/FindFFTW3.cmake

          cmake -G "MSYS Makefiles" -S . -B wsjtx-build \
            -DCMAKE_PREFIX_PATH="${WORKSPACE}/hamlib-prefix" \
            -DCMAKE_Fortran_FLAGS="-fallow-argument-mismatch -std=legacy" \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DWSJT_GENERATE_DOCS=OFF \
            -DWSJT_SKIP_MANPAGES=ON \
            -Wno-dev

      - name: Build
        run: cmake --build wsjtx-build -j$(nproc)

      - name: Verify binary
        run: |
          file wsjtx-build/jt9.exe

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wsjtx-${{ inputs.version }}-windows-x86_64
          path: |
            wsjtx-build/jt9.exe
            wsjtx-build/wsprd.exe
            wsjtx-build/wsjtx.exe
