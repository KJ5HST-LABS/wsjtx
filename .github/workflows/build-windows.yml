name: Build Windows x86_64

on:
  workflow_call:
    inputs:
      version:
        description: "WSJT-X version string"
        required: true
        type: string
      hamlib_branch:
        description: "Hamlib branch to build"
        required: false
        type: string
        default: "4.7.0"

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          cache: true
          install: >-
            git make tar
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-gcc-fortran
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-qt5-base
            mingw-w64-x86_64-qt5-multimedia
            mingw-w64-x86_64-qt5-serialport
            mingw-w64-x86_64-qt5-tools
            mingw-w64-x86_64-qt5-websockets
            mingw-w64-x86_64-qt5-activeqt
            mingw-w64-x86_64-fftw
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-libusb
            mingw-w64-x86_64-portaudio
            mingw-w64-x86_64-pkg-config
            autoconf automake libtool

      - name: Cache Hamlib
        id: hamlib-cache
        uses: actions/cache@v4
        with:
          path: hamlib-prefix
          key: hamlib-windows-${{ inputs.hamlib_branch }}-${{ hashFiles('.github/workflows/build-windows.yml') }}

      - name: Build Hamlib
        if: steps.hamlib-cache.outputs.cache-hit != 'true'
        env:
          MSYS2_PATH_TYPE: inherit
        run: |
          WORKSPACE=$(cygpath "${GITHUB_WORKSPACE}")
          git clone --depth 1 --branch "${{ inputs.hamlib_branch }}" \
            https://github.com/Hamlib/Hamlib.git hamlib-src
          cd hamlib-src
          ./bootstrap
          ./configure \
            --prefix="${WORKSPACE}/hamlib-prefix" \
            --enable-shared --disable-static \
            --without-cxx-binding \
            --without-readline \
            CFLAGS="-DNDEBUG -g -O2 -fdata-sections -ffunction-sections" \
            LDFLAGS="-Wl,--gc-sections"
          make -j$(nproc)
          make install-strip

      - name: Install OmniRig
        shell: powershell
        run: |
          # OmniRig is a COM server required by WSJT-X on Windows for rig control
          $url = "https://www.dxatlas.com/OmniRig/Files/OmniRig.zip"
          $zip = "$env:RUNNER_TEMP\OmniRig.zip"
          $dir = "$env:RUNNER_TEMP\OmniRig"

          Write-Host "Downloading OmniRig..."
          Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing
          Write-Host "Download size: $((Get-Item $zip).Length) bytes"

          Expand-Archive -Path $zip -DestinationPath $dir -Force
          Write-Host "Extracted contents:"
          Get-ChildItem -Path $dir -Recurse | ForEach-Object { Write-Host "  $($_.FullName)" }

          # Look for InnoSetup installer
          $setup = Get-ChildItem -Path $dir -Recurse -Filter "*.exe" | Select-Object -First 1
          if ($setup) {
            Write-Host "Running installer: $($setup.FullName)"
            Start-Process -FilePath $setup.FullName -ArgumentList "/VERYSILENT","/NORESTART","/SUPPRESSMSGBOXES" -Wait -NoNewWindow
            Write-Host "Installer finished"
          }

          # OmniRig.exe IS the COM server — register it
          $exe = "${env:ProgramFiles(x86)}\Afreet\OmniRig\OmniRig.exe"
          if (!(Test-Path $exe)) {
            Write-Host "ERROR: OmniRig.exe not found"
            exit 1
          }
          Write-Host "Registering OmniRig COM server..."
          Start-Process -FilePath $exe -ArgumentList "/regserver" -Wait -NoNewWindow

          # OmniRig is 32-bit and registers in WOW6432Node.
          # Mirror the TypeLib entry to the 64-bit hive so 64-bit dumpcpp can find it.
          Write-Host "Mirroring 32-bit TypeLib to 64-bit registry..."
          $wow = "HKLM:\SOFTWARE\WOW6432Node\Classes\TypeLib"
          $target = "HKLM:\SOFTWARE\Classes\TypeLib"
          Get-ChildItem $wow -Recurse -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -match "OmniRig" } |
            ForEach-Object { Write-Host "  Found 32-bit TypeLib: $($_.Name)" }

          # Copy the OmniRig CLSID and TypeLib from WOW64 to native 64-bit
          $clsid = "{4FE359C5-A58F-459D-BE95-CA559FB4F270}"
          $wowClsid = "HKLM:\SOFTWARE\WOW6432Node\Classes\CLSID\$clsid"
          $natClsid = "HKLM:\SOFTWARE\Classes\CLSID\$clsid"
          if ((Test-Path $wowClsid) -and !(Test-Path $natClsid)) {
            Write-Host "Copying CLSID from WOW64 to native..."
            Copy-Item -Path $wowClsid -Destination $natClsid -Recurse -Force
          }

          # Also mirror the TypeLib GUID used by OmniRig
          # Search for it and copy
          Get-ChildItem "$wow" -ErrorAction SilentlyContinue | ForEach-Object {
            $tlbKey = $_
            if ((Get-ChildItem $tlbKey.PSPath -Recurse -ErrorAction SilentlyContinue | Out-String) -match "OmniRig") {
              $natKey = $tlbKey.PSPath -replace "WOW6432Node\\", ""
              if (!(Test-Path $natKey)) {
                Write-Host "Copying TypeLib: $($tlbKey.Name)"
                Copy-Item -Path $tlbKey.PSPath -Destination $natKey -Recurse -Force
              }
            }
          }

          # Dump what actually got registered
          Write-Host "Checking all registry hives for OmniRig..."
          foreach ($hive in @("HKLM:\SOFTWARE\Classes\CLSID", "HKLM:\SOFTWARE\WOW6432Node\Classes\CLSID", "HKCU:\SOFTWARE\Classes\CLSID")) {
            if (Test-Path $hive) {
              $found = Get-ChildItem $hive -ErrorAction SilentlyContinue | Where-Object {
                (Get-ItemProperty -Path "$($_.PSPath)\InprocServer32" -ErrorAction SilentlyContinue) -or
                (Get-ItemProperty -Path $_.PSPath -ErrorAction SilentlyContinue).'(default)' -match 'OmniRig'
              }
              if ($found) { $found | ForEach-Object { Write-Host "  $hive : $($_.PSChildName)" } }
            }
          }
          # Also check TypeLib hives
          foreach ($hive in @("HKLM:\SOFTWARE\Classes\TypeLib", "HKLM:\SOFTWARE\WOW6432Node\Classes\TypeLib", "HKCU:\SOFTWARE\Classes\TypeLib")) {
            if (Test-Path $hive) {
              Get-ChildItem $hive -ErrorAction SilentlyContinue | ForEach-Object {
                $content = Get-ChildItem $_.PSPath -Recurse -ErrorAction SilentlyContinue | Out-String
                if ($content -match "OmniRig") {
                  Write-Host "  TypeLib in $hive : $($_.PSChildName)"
                }
              }
            }
          }
          # Check if the OmniRig.exe registered as a LocalServer32
          $localSrv = "HKLM:\SOFTWARE\Classes\CLSID\$clsid\LocalServer32"
          $localSrvWow = "HKLM:\SOFTWARE\WOW6432Node\Classes\CLSID\$clsid\LocalServer32"
          $localSrvCU = "HKCU:\SOFTWARE\Classes\CLSID\$clsid\LocalServer32"
          foreach ($k in @($localSrv, $localSrvWow, $localSrvCU)) {
            if (Test-Path $k) {
              Write-Host "  LocalServer32 at $k : $((Get-ItemProperty $k).'(default)')"
            }
          }

      - name: Configure
        run: |
          WORKSPACE=$(cygpath "${GITHUB_WORKSPACE}")
          cmake -G "MSYS Makefiles" -S . -B wsjtx-build \
            -DCMAKE_PREFIX_PATH="${WORKSPACE}/hamlib-prefix" \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DWSJT_GENERATE_DOCS=OFF \
            -DWSJT_SKIP_MANPAGES=ON \
            -Wno-dev

      - name: Build
        run: cmake --build wsjtx-build -j$(nproc)

      - name: Verify binary
        run: |
          file wsjtx-build/jt9.exe

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wsjtx-${{ inputs.version }}-windows-x86_64
          path: |
            wsjtx-build/jt9.exe
            wsjtx-build/wsprd.exe
            wsjtx-build/wsjtx.exe
