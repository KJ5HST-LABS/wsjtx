name: Build Windows x86_64

on:
  workflow_call:
    inputs:
      version:
        description: "WSJT-X version string"
        required: true
        type: string
      hamlib_branch:
        description: "Hamlib branch to build"
        required: false
        type: string
        default: "4.7.0"

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          cache: true
          install: >-
            git make tar
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-gcc-fortran
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-qt5-base
            mingw-w64-x86_64-qt5-multimedia
            mingw-w64-x86_64-qt5-serialport
            mingw-w64-x86_64-qt5-tools
            mingw-w64-x86_64-qt5-websockets
            mingw-w64-x86_64-qt5-activeqt
            mingw-w64-x86_64-fftw
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-libusb
            mingw-w64-x86_64-portaudio
            mingw-w64-x86_64-pkg-config
            autoconf automake libtool

      - name: Cache Hamlib
        id: hamlib-cache
        uses: actions/cache@v4
        with:
          path: hamlib-prefix
          key: hamlib-windows-${{ inputs.hamlib_branch }}-${{ hashFiles('.github/workflows/build-windows.yml') }}

      - name: Build Hamlib
        if: steps.hamlib-cache.outputs.cache-hit != 'true'
        env:
          MSYS2_PATH_TYPE: inherit
        run: |
          WORKSPACE=$(cygpath "${GITHUB_WORKSPACE}")
          git clone --depth 1 --branch "${{ inputs.hamlib_branch }}" \
            https://github.com/Hamlib/Hamlib.git hamlib-src
          cd hamlib-src
          ./bootstrap
          ./configure \
            --prefix="${WORKSPACE}/hamlib-prefix" \
            --enable-shared --disable-static \
            --without-cxx-binding \
            --without-readline \
            CFLAGS="-DNDEBUG -g -O2 -fdata-sections -ffunction-sections" \
            LDFLAGS="-Wl,--gc-sections"
          make -j$(nproc)
          make install-strip

      - name: Install OmniRig
        shell: powershell
        run: |
          # OmniRig is a COM server required by WSJT-X on Windows for rig control.
          # The installer's /regserver fails silently on CI runners.
          # Workaround: extract the type library from OmniRig.exe and register it manually.
          $url = "https://www.dxatlas.com/OmniRig/Files/OmniRig.zip"
          $zip = "$env:RUNNER_TEMP\OmniRig.zip"
          $dir = "$env:RUNNER_TEMP\OmniRig"

          Write-Host "Downloading OmniRig..."
          Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing
          Expand-Archive -Path $zip -DestinationPath $dir -Force

          # Run the installer
          $setup = Get-ChildItem -Path $dir -Recurse -Filter "*.exe" | Select-Object -First 1
          Start-Process -FilePath $setup.FullName -ArgumentList "/VERYSILENT","/NORESTART","/SUPPRESSMSGBOXES" -Wait -NoNewWindow

          # The OmniRig.exe embeds a type library. Extract it with the Windows SDK tool.
          $exe = "${env:ProgramFiles(x86)}\Afreet\OmniRig\OmniRig.exe"
          $tlbDir = "$env:RUNNER_TEMP\omnirig-tlb"
          New-Item -ItemType Directory -Force -Path $tlbDir | Out-Null

          # Use regtlb or manually create registry entries pointing to the exe as a TypeLib
          # OmniRig's CLSID is {4FE359C5-A58F-459D-BE95-CA559FB4F270}
          # Its TypeLib GUID is {4FE359C5-A58F-459D-BE95-CA559FB4F270} (same)
          $clsid = "{4FE359C5-A58F-459D-BE95-CA559FB4F270}"

          # Manually create the registry entries that /regserver would create
          # CLSID entry (LocalServer32)
          $clsidPath = "HKLM:\SOFTWARE\Classes\CLSID\$clsid"
          New-Item -Path "$clsidPath\LocalServer32" -Force | Out-Null
          Set-ItemProperty -Path "$clsidPath\LocalServer32" -Name "(default)" -Value $exe
          Set-ItemProperty -Path $clsidPath -Name "(default)" -Value "OmniRig Engine"

          # TypeLib entry pointing to the exe (type library is embedded in the exe)
          $tlbPath = "HKLM:\SOFTWARE\Classes\TypeLib\$clsid\1.0\0\win32"
          New-Item -Path $tlbPath -Force | Out-Null
          Set-ItemProperty -Path $tlbPath -Name "(default)" -Value $exe
          $tlbParent = "HKLM:\SOFTWARE\Classes\TypeLib\$clsid\1.0"
          Set-ItemProperty -Path $tlbParent -Name "(default)" -Value "OmniRig Engine Type Library"

          # Also create a 64-bit entry since dumpcpp may look there
          $tlb64Path = "HKLM:\SOFTWARE\Classes\TypeLib\$clsid\1.0\0\win64"
          New-Item -Path $tlb64Path -Force | Out-Null
          Set-ItemProperty -Path $tlb64Path -Name "(default)" -Value $exe

          Write-Host "OmniRig registry entries created manually"
          Write-Host "TypeLib path: $exe"

      - name: Configure
        run: |
          WORKSPACE=$(cygpath "${GITHUB_WORKSPACE}")
          cmake -G "MSYS Makefiles" -S . -B wsjtx-build \
            -DCMAKE_PREFIX_PATH="${WORKSPACE}/hamlib-prefix" \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DWSJT_GENERATE_DOCS=OFF \
            -DWSJT_SKIP_MANPAGES=ON \
            -Wno-dev

      - name: Build
        run: cmake --build wsjtx-build -j$(nproc)

      - name: Verify binary
        run: |
          file wsjtx-build/jt9.exe

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wsjtx-${{ inputs.version }}-windows-x86_64
          path: |
            wsjtx-build/jt9.exe
            wsjtx-build/wsprd.exe
            wsjtx-build/wsjtx.exe
