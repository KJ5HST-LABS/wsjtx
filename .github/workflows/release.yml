name: Release

on:
  push:
    tags: ["build/v*"]

jobs:
  # ── Derive the version string once from the pushed tag ────────────
  # Strips the "build/v" prefix so artifacts are named "wsjtx-3.0.1-rc1-*"
  # rather than "wsjtx-build/v3.0.1-rc1-*". RC/beta suffixes (e.g.
  # build/v3.0.1-rc1 → 3.0.1-rc1) are preserved so pre-release artifacts
  # are distinguishable from GA. All downstream jobs consume this
  # single output so the four platform artifacts cannot disagree.
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - id: v
        run: echo "version=${GITHUB_REF_NAME#build/v}" >> "$GITHUB_OUTPUT"

  # ── Build all four platforms ───────────────────────────────────────
  macos:
    needs: prepare
    uses: ./.github/workflows/build-macos.yml
    with:
      version: ${{ needs.prepare.outputs.version }}
      hamlib_branch: "4.7.1"
      arch: "arm64"
      runner: "macos-15"
      deployment_target: "11.0"
    secrets: inherit

  macos-intel:
    needs: prepare
    uses: ./.github/workflows/build-macos.yml
    with:
      version: ${{ needs.prepare.outputs.version }}
      hamlib_branch: "4.7.1"
      arch: "x86_64"
      runner: "macos-15-intel"
      deployment_target: "10.13"
    secrets: inherit

  linux:
    needs: prepare
    uses: ./.github/workflows/build-linux.yml
    with:
      version: ${{ needs.prepare.outputs.version }}
      hamlib_branch: "4.7.1"
    secrets: inherit

  windows:
    needs: prepare
    uses: ./.github/workflows/build-windows.yml
    with:
      version: ${{ needs.prepare.outputs.version }}
      hamlib_branch: "4.7.1"
    secrets: inherit

  # ── Publish release + sync to public repo ──────────────────────────
  release:
    needs: [prepare, macos, macos-intel, linux, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Build source tarball
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          # This repo has no git submodules, so git archive's default
          # single-tree output captures the full source. If submodules
          # are ever added, this step must be revisited — git archive
          # does not recurse into submodules on its own.
          git archive \
            --format=tar.gz \
            --prefix="wsjtx-${VERSION}/" \
            -o "artifacts/wsjtx-${VERSION}-src.tar.gz" \
            "${GITHUB_REF_NAME}"
          ls -lh "artifacts/wsjtx-${VERSION}-src.tar.gz"

      - name: List artifacts
        run: find artifacts -type f | sort

      # ── All-platforms-ready gate (Issue #25) ───────────────────────────
      # Refuse to publish unless every platform produced an installer-grade
      # artifact. The release job's `needs:` already enforces structural
      # success (all 4 builds ran and exited 0), but a build can exit 0
      # without actually packaging — e.g. a packaging step behind an `if:`
      # that evaluated false, or an upload-artifact step that silently
      # matched zero files. This gate fails the release job BEFORE any
      # asset upload so partial releases never reach GitHub Releases or
      # the public mirror.
      #
      # Expected artifact layout (one installer per platform, per the
      # four build-*.yml upload-artifact steps):
      #   artifacts/wsjtx-<ver>-arm64-macOS.pkg/*.pkg
      #   artifacts/wsjtx-<ver>-x86_64-macOS.pkg/*.pkg
      #   artifacts/wsjtx-<ver>-linux-x86_64-AppImage/*.AppImage
      #   artifacts/wsjtx-<ver>-windows-x86_64-installer/*.exe
      #
      # Upstream replication: this gate encodes the sandbox's policy
      # ("publish only when all four platforms have an installer"). If
      # upstream chooses a different policy (e.g. publish any-platform-
      # ready), adjust or remove this step.
      - name: Verify installer-grade artifacts (all-platforms-ready gate)
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          shopt -s nullglob
          labels=(
            "macOS arm64 .pkg"
            "macOS x86_64 .pkg"
            "Linux .AppImage"
            "Windows .exe"
          )
          patterns=(
            "artifacts/wsjtx-${VERSION}-arm64-macOS.pkg/*.pkg"
            "artifacts/wsjtx-${VERSION}-x86_64-macOS.pkg/*.pkg"
            "artifacts/wsjtx-${VERSION}-linux-x86_64-AppImage/*.AppImage"
            "artifacts/wsjtx-${VERSION}-windows-x86_64-installer/*.exe"
          )
          missing=0
          echo "Installer-grade artifact gate — checking 4 platforms…"
          for i in "${!labels[@]}"; do
            # shellcheck disable=SC2206 # word-split is intentional; nullglob makes it safe.
            matches=( ${patterns[$i]} )
            if [ ${#matches[@]} -eq 0 ]; then
              echo "::error::MISSING  ${labels[$i]} — no match for ${patterns[$i]}"
              missing=$((missing + 1))
            else
              size=$(stat --printf '%s' "${matches[0]}")
              printf '  ok  %-20s %s (%s bytes)\n' "${labels[$i]}" "${matches[0]}" "$size"
            fi
          done
          if [ "$missing" -gt 0 ]; then
            echo "::error::All-platforms-ready gate FAILED — $missing of 4 platform(s) missing installer-grade artifact."
            echo "::error::Refusing to publish a partial release. Fix the failing build job(s) and retry the tag."
            exit 1
          fi
          echo "All-platforms-ready gate PASSED — all 4 installer-grade artifacts present. Proceeding to publish."

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Filter to user-facing release assets. `find artifacts -type f`
          # without filtering pulls in 4× ctest-results.xml (one per
          # platform) and per-binary tarballs from individual-binaries-*
          # that collide on basename across architectures — `gh release
          # create` uses basenames as asset names and duplicates cause
          # upload failures.
          FILES=$(find artifacts -maxdepth 2 -type f \
            \( -name "*.pkg" -o -name "*.AppImage" \
               -o -name "*.exe" -o -name "*.tar.gz" \))
          # SemVer pre-release tags contain a hyphen after the version
          # (e.g., v3.0.1-rc1, v3.0.1-rc2, v3.0.1-beta1). Flag those as
          # GitHub pre-releases so they don't appear as the latest stable.
          PRERELEASE_FLAG=""
          if [[ "$TAG" == *-* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$TAG" \
            --title "WSJT-X ${{ needs.prepare.outputs.version }}" \
            --generate-notes \
            $PRERELEASE_FLAG \
            $FILES

      - name: Push to public repo
        env:
          TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::warning::CROSS_REPO_TOKEN not set — skipping public repo sync"
            exit 0
          fi
          # Deploy keys can't push .github/workflows/ (GitHub platform
          # restriction).  Use CROSS_REPO_TOKEN (PAT with repo+workflow
          # scopes) over HTTPS instead.
          git remote add public https://x-access-token:${TOKEN}@github.com/KJ5HST-LABS/wsjtx.git || true
          git push public HEAD:main --force
          git push public "$GITHUB_REF_NAME"
