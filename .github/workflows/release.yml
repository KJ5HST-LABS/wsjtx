name: Release

on:
  push:
    tags: ["v*"]

jobs:
  # ── Build all three platforms ──────────────────────────────────────
  macos:
    uses: ./.github/workflows/build-macos.yml
    with:
      version: "3.0.0"
      hamlib_branch: "4.7.0"
    secrets: inherit

  linux:
    uses: ./.github/workflows/build-linux.yml
    with:
      version: "3.0.0"
      hamlib_branch: "4.7.0"
    secrets: inherit

  windows:
    uses: ./.github/workflows/build-windows.yml
    with:
      version: "3.0.0"
      hamlib_branch: "4.7.0"
    secrets: inherit

  # ── Publish release + sync to public repo ──────────────────────────
  release:
    needs: [macos, linux, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          FILES=$(find artifacts -type f)
          gh release create "$TAG" \
            --title "WSJT-X $TAG" \
            --generate-notes \
            $FILES

      - name: Push tag to public repo
        env:
          SSH_KEY: ${{ secrets.WSJTX_DEPLOY_KEY }}
        run: |
          if [ -z "$SSH_KEY" ]; then
            echo "::warning::WSJTX_DEPLOY_KEY not set — skipping public repo sync"
            exit 0
          fi
          # Remove the HTTPS credential that actions/checkout injects — it lacks
          # the 'workflow' scope needed to push .github/workflows/ files.
          # The SSH deploy key has no such restriction.
          git config --unset-all http.https://github.com/.extraheader || true
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          git remote add public git@github.com:KJ5HST-LABS/wsjtx.git || true
          git push public HEAD:main --force
          git push public "$GITHUB_REF_NAME"
          rm -f ~/.ssh/deploy_key
