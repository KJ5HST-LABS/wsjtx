name: Build Linux x86_64

on:
  workflow_call:
    inputs:
      version:
        description: "WSJT-X version string"
        required: true
        type: string
      hamlib_branch:
        description: "Hamlib branch to build"
        required: false
        type: string
        default: "4.7.0"

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake gfortran \
            libfftw3-dev libboost-all-dev \
            qtbase5-dev qttools5-dev qtmultimedia5-dev libqt5serialport5-dev \
            libqt5sql5-sqlite libqt5websockets5-dev \
            libusb-1.0-0-dev libudev-dev libreadline-dev \
            autoconf automake libtool pkg-config \
            texinfo

      - name: Cache Hamlib
        id: hamlib-cache
        uses: actions/cache@v4
        with:
          path: hamlib-prefix
          key: hamlib-linux-${{ inputs.hamlib_branch }}-${{ hashFiles('.github/workflows/build-linux.yml') }}

      - name: Build Hamlib
        if: steps.hamlib-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch "${{ inputs.hamlib_branch }}" \
            https://github.com/Hamlib/Hamlib.git hamlib-src
          cd hamlib-src
          ./bootstrap
          ./configure \
            --prefix="${GITHUB_WORKSPACE}/hamlib-prefix" \
            --disable-shared --enable-static \
            --without-cxx-binding \
            CFLAGS="-g -O2 -fPIC -fdata-sections -ffunction-sections" \
            LDFLAGS="-Wl,--gc-sections"
          make -j$(nproc)
          make install

      - name: Configure
        run: |
          cmake -S . -B wsjtx-build \
            -DCMAKE_PREFIX_PATH="${GITHUB_WORKSPACE}/hamlib-prefix" \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DWSJT_GENERATE_DOCS=OFF \
            -DWSJT_SKIP_MANPAGES=ON \
            -Wno-dev

      - name: Build
        run: cmake --build wsjtx-build -j$(nproc)

      - name: Run tests
        run: ctest --output-on-failure
        working-directory: wsjtx-build
        env:
          QT_QPA_PLATFORM: offscreen

      - name: Verify binary
        run: |
          file wsjtx-build/jt9
          file wsjtx-build/jt9 | grep -q "ELF 64-bit"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wsjtx-${{ inputs.version }}-linux-x86_64
          path: |
            wsjtx-build/jt9
            wsjtx-build/wsprd
            wsjtx-build/wsjtx
