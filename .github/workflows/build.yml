name: Build WSJT-X arm64

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      wsjtx_version:
        description: "WSJT-X version to build"
        default: "3.0.0-rc1"
        required: true

env:
  WSJTX_VERSION: ${{ github.event.inputs.wsjtx_version || '3.0.0-rc1' }}

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install cmake gcc fftw boost qt@5 libusb

      - name: Locate gfortran
        id: fc
        run: |
          FC="$(brew --prefix gcc)/bin/gfortran"
          [ -f "$FC" ] || FC="$(ls /opt/homebrew/bin/gfortran-* 2>/dev/null | sort -V | tail -1)"
          echo "Found gfortran: $FC"
          echo "path=$FC" >> "$GITHUB_OUTPUT"

      - name: Fix Qt5 keg-only paths
        run: |
          QT5_PREFIX="$(brew --prefix qt@5)"
          [ -e /opt/homebrew/mkspecs ] || ln -s "${QT5_PREFIX}/mkspecs" /opt/homebrew/mkspecs
          [ -e /opt/homebrew/plugins ] || ln -s "${QT5_PREFIX}/plugins" /opt/homebrew/plugins

      - name: Download source
        run: |
          curl -L -o "wsjtx-${WSJTX_VERSION}.tgz" \
            "https://sourceforge.net/projects/wsjt/files/wsjtx-${WSJTX_VERSION}/wsjtx-${WSJTX_VERSION}.tgz/download"
          tar xzf "wsjtx-${WSJTX_VERSION}.tgz"

      - name: Patch superbuild for CMake 4.x
        run: |
          sed -i '' \
            -e 's/^add_custom_target (install DEPENDS/add_custom_target (wsjtx-do-install DEPENDS/' \
            -e 's/^add_custom_target (package DEPENDS/add_custom_target (wsjtx-do-package DEPENDS/' \
            "wsjtx-${WSJTX_VERSION}/CMakeLists.txt"

      - name: Configure
        run: |
          mkdir wsjtx-build
          cmake -S "wsjtx-${WSJTX_VERSION}" -B wsjtx-build \
            -DCMAKE_PREFIX_PATH="$(brew --prefix qt@5);$(brew --prefix libusb);$(brew --prefix fftw);$(brew --prefix boost)" \
            -DCMAKE_Fortran_COMPILER="${{ steps.fc.outputs.path }}" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DWSJT_GENERATE_DOCS=OFF \
            -DWSJT_SKIP_MANPAGES=ON \
            -Wno-dev

      - name: Build
        run: cmake --build wsjtx-build

      - name: Verify arm64
        run: |
          JT9=wsjtx-build/wsjtx-prefix/src/wsjtx-build/jt9
          file "$JT9"
          lipo -archs "$JT9" | grep -q arm64

      - name: Collect binaries
        id: collect
        run: |
          BUILD=wsjtx-build/wsjtx-prefix/src/wsjtx-build
          STAGE=stage/wsjtx-${WSJTX_VERSION}-arm64
          ASSETS=assets

          mkdir -p "${STAGE}" "${ASSETS}"

          # Full GUI app bundle
          cp -R "${BUILD}/wsjtx.app" "${STAGE}/"

          # CLI decoder tools
          for bin in jt9 wsprd wsprcode jt65code jt4code ft8code q65code encode77 fcal hash22calc; do
            [ -f "${BUILD}/${bin}" ] && cp "${BUILD}/${bin}" "${STAGE}/" && cp "${BUILD}/${bin}" "${ASSETS}/"
          done

          # Simulators
          for bin in ft4sim jt4sim jt65sim cwsim sfoxsim echosim EchoCallSim; do
            [ -f "${BUILD}/${bin}" ] && cp "${BUILD}/${bin}" "${STAGE}/" && cp "${BUILD}/${bin}" "${ASSETS}/"
          done

          echo "stage_dir=${STAGE}" >> "$GITHUB_OUTPUT"
          echo "assets_dir=${ASSETS}" >> "$GITHUB_OUTPUT"
          echo "dmg_name=wsjtx-${WSJTX_VERSION}-arm64-macOS.dmg" >> "$GITHUB_OUTPUT"

      - name: Bundle dylibs into app
        run: |
          STAGE="${{ steps.collect.outputs.stage_dir }}"
          APP="${STAGE}/wsjtx.app"
          FRAMEWORKS="${APP}/Contents/Frameworks"
          GCC_LIB="$(brew --prefix gcc)/lib/gcc/current"
          mkdir -p "${FRAMEWORKS}"

          # Use macdeployqt to bundle Qt frameworks and plugins
          "$(brew --prefix qt@5)/bin/macdeployqt" "${APP}" -verbose=1

          # Resolve a dylib path to an actual file
          resolve_lib() {
            local lib="$1"
            if [[ "$lib" == /opt/homebrew/* ]]; then
              echo "$lib"
            elif [[ "$lib" == @rpath/* ]]; then
              local name="${lib#@rpath/}"
              # Search known rpath locations
              for dir in "$GCC_LIB" /opt/homebrew/lib; do
                [ -f "$dir/$name" ] && echo "$dir/$name" && return
              done
            fi
          }

          # Recursively bundle a binary's non-system, non-Qt dylibs
          bundle_dylib() {
            local binary="$1"
            for lib in $(otool -L "$binary" | awk '{print $1}' | grep -E '(/opt/homebrew|@rpath)' | grep -v Qt); do
              local resolved
              resolved=$(resolve_lib "$lib")
              [ -z "$resolved" ] && continue
              local libname=$(basename "$resolved")
              if [ ! -f "${FRAMEWORKS}/${libname}" ]; then
                echo "  Bundling: $resolved -> ${FRAMEWORKS}/${libname}"
                cp "$resolved" "${FRAMEWORKS}/${libname}"
                chmod 644 "${FRAMEWORKS}/${libname}"
                install_name_tool -id "@executable_path/../Frameworks/${libname}" "${FRAMEWORKS}/${libname}"
                # Recurse into this lib's deps
                bundle_dylib "${FRAMEWORKS}/${libname}"
              fi
              install_name_tool -change "$lib" "@executable_path/../Frameworks/${libname}" "$binary" 2>/dev/null || true
            done
          }

          # Fix the main executable
          bundle_dylib "${APP}/Contents/MacOS/wsjtx"

          # Also fix any already-bundled Frameworks that have @rpath or Homebrew refs
          for fw in "${FRAMEWORKS}"/*.dylib; do
            [ -f "$fw" ] && bundle_dylib "$fw"
          done

          # Verify no Homebrew or @rpath refs remain
          echo "Checking for remaining external references..."
          REMAINING=$(otool -L "${APP}/Contents/MacOS/wsjtx" "${FRAMEWORKS}"/*.dylib 2>/dev/null | grep -E '(/opt/homebrew|@rpath)' | grep -v Qt || true)
          if [ -n "$REMAINING" ]; then
            echo "WARNING: External paths still present:"
            echo "$REMAINING"
          else
            echo "All dylibs bundled successfully"
          fi

      - name: Bundle dylibs into CLI tools
        run: |
          ASSETS="${{ steps.collect.outputs.assets_dir }}"
          STAGE="${{ steps.collect.outputs.stage_dir }}"
          GCC_LIB="$(brew --prefix gcc)/lib/gcc/current"
          LIBDIR="${ASSETS}/lib"
          mkdir -p "${LIBDIR}"

          resolve_lib() {
            local lib="$1"
            if [[ "$lib" == /opt/homebrew/* ]]; then
              echo "$lib"
            elif [[ "$lib" == @rpath/* ]]; then
              local name="${lib#@rpath/}"
              for dir in "$GCC_LIB" /opt/homebrew/lib; do
                [ -f "$dir/$name" ] && echo "$dir/$name" && return
              done
            fi
          }

          bundle_cli() {
            local binary="$1"
            local libdir="$2"
            for lib in $(otool -L "$binary" | awk '{print $1}' | grep -E '(/opt/homebrew|@rpath)'); do
              local resolved
              resolved=$(resolve_lib "$lib")
              [ -z "$resolved" ] && continue
              local libname=$(basename "$resolved")
              if [ ! -f "${libdir}/${libname}" ]; then
                echo "  Bundling: $resolved"
                cp "$resolved" "${libdir}/${libname}"
                chmod 644 "${libdir}/${libname}"
                install_name_tool -id "@loader_path/lib/${libname}" "${libdir}/${libname}"
                bundle_cli "${libdir}/${libname}" "${libdir}"
              fi
              install_name_tool -change "$lib" "@loader_path/lib/${libname}" "$binary" 2>/dev/null || true
            done
          }

          for bin in "${ASSETS}"/*; do
            [ -f "$bin" ] && [ -x "$bin" ] && [ "$(basename "$bin")" != "lib" ] && {
              echo "Bundling dylibs for $(basename "$bin")..."
              bundle_cli "$bin" "${LIBDIR}"
            }
          done

          # Fix libs that reference other libs in the same dir
          for lib in "${LIBDIR}"/*.dylib; do
            [ -f "$lib" ] && bundle_cli "$lib" "${LIBDIR}"
          done

          # Copy lib dir to stage for the DMG, and fix stage binaries
          cp -R "${LIBDIR}" "${STAGE}/lib"
          for bin in "${STAGE}"/*; do
            [ -f "$bin" ] && [ -x "$bin" ] && {
              for lib in $(otool -L "$bin" | awk '{print $1}' | grep -E '(/opt/homebrew|@rpath)'); do
                resolved=$(resolve_lib "$lib")
                [ -z "$resolved" ] && continue
                libname=$(basename "$resolved")
                install_name_tool -change "$lib" "@loader_path/lib/${libname}" "$bin" 2>/dev/null || true
              done
            }
          done

      - name: Import signing certificate
        env:
          P12_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          # Decode certificate
          echo "$P12_BASE64" | base64 --decode > "$CERT_PATH"

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          # Find the Developer ID identity
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
          echo "Found identity: $IDENTITY"
          echo "identity=$IDENTITY" >> "$GITHUB_OUTPUT"
        id: keychain

      - name: Code sign binaries
        run: |
          STAGE="${{ steps.collect.outputs.stage_dir }}"
          ASSETS="${{ steps.collect.outputs.assets_dir }}"
          IDENTITY="${{ steps.keychain.outputs.identity }}"
          APP="${STAGE}/wsjtx.app"

          echo "Signing with: $IDENTITY"

          # Sign every Mach-O inside the app bundle individually (inside-out)
          # Frameworks
          find "${APP}/Contents/Frameworks" -type f \( -name "*.dylib" -o -perm +111 \) \
            -exec codesign --force --options runtime --timestamp --sign "$IDENTITY" {} \;
          # Framework bundles
          find "${APP}/Contents/Frameworks" -name "*.framework" -type d | while read fw; do
            codesign --force --options runtime --timestamp --sign "$IDENTITY" "$fw"
          done
          # Plugins
          find "${APP}/Contents/PlugIns" -type f -name "*.dylib" \
            -exec codesign --force --options runtime --timestamp --sign "$IDENTITY" {} \; 2>/dev/null || true
          # Main executable and bundle
          codesign --force --options runtime --timestamp --sign "$IDENTITY" "${APP}/Contents/MacOS/wsjtx"
          codesign --force --options runtime --timestamp --sign "$IDENTITY" "${APP}"

          # Verify
          codesign --verify --deep --strict --verbose=2 "${APP}"

          # Sign standalone CLI binaries
          for dir in "${STAGE}" "${ASSETS}"; do
            find "${dir}" -maxdepth 1 -type f -perm +111 \
              -exec codesign --force --options runtime --timestamp --sign "$IDENTITY" {} \;
          done

          # Sign bundled dylibs for CLI tools
          for dir in "${STAGE}/lib" "${ASSETS}/lib"; do
            [ -d "$dir" ] && find "$dir" -type f \
              -exec codesign --force --options runtime --timestamp --sign "$IDENTITY" {} \;
          done

      - name: Build installer pkg
        run: |
          STAGE="${{ steps.collect.outputs.stage_dir }}"
          IDENTITY="${{ steps.keychain.outputs.identity }}"
          PKG_ID="org.k1jt.wsjtx.arm64"
          PKG_VERSION="${WSJTX_VERSION%-rc*}"

          # Create payload root
          PAYLOAD="$RUNNER_TEMP/pkg-payload"
          SCRIPTS="$RUNNER_TEMP/pkg-scripts"
          mkdir -p "${PAYLOAD}/Applications" "${PAYLOAD}/Library/LaunchDaemons" "${SCRIPTS}"

          # App bundle
          cp -R "${STAGE}/wsjtx.app" "${PAYLOAD}/Applications/"

          # CLI tools + libs into /usr/local/wsjtx
          mkdir -p "${PAYLOAD}/usr/local/wsjtx/lib"
          for bin in "${STAGE}"/*; do
            [ -f "$bin" ] && [ -x "$bin" ] && cp "$bin" "${PAYLOAD}/usr/local/wsjtx/"
          done
          [ -d "${STAGE}/lib" ] && cp -R "${STAGE}/lib/"* "${PAYLOAD}/usr/local/wsjtx/lib/"

          # Shared memory sysctl plist
          BUILD=wsjtx-build/wsjtx-prefix/src/wsjtx
          cp "${BUILD}/Darwin/com.wsjtx.sysctl.plist" "${PAYLOAD}/Library/LaunchDaemons/"

          # Postinstall script to load the sysctl plist
          cat > "${SCRIPTS}/postinstall" << 'SCRIPT'
          #!/bin/bash
          /bin/launchctl load /Library/LaunchDaemons/com.wsjtx.sysctl.plist 2>/dev/null || true
          /usr/sbin/sysctl kern.sysv.shmmax=52428800 kern.sysv.shmall=25600 2>/dev/null || true
          # Symlink CLI tools
          mkdir -p /usr/local/bin
          for bin in /usr/local/wsjtx/*; do
            [ -f "$bin" ] && [ -x "$bin" ] && ln -sf "$bin" "/usr/local/bin/$(basename "$bin")"
          done
          SCRIPT
          chmod +x "${SCRIPTS}/postinstall"

          # Build the component pkg
          pkgbuild \
            --root "${PAYLOAD}" \
            --scripts "${SCRIPTS}" \
            --identifier "${PKG_ID}" \
            --version "${PKG_VERSION}" \
            --install-location / \
            "$RUNNER_TEMP/wsjtx-component.pkg"

          # Build the distribution pkg (nicer installer UI)
          productbuild \
            --package "$RUNNER_TEMP/wsjtx-component.pkg" \
            --sign "$IDENTITY" \
            "${{ steps.collect.outputs.dmg_name%.dmg}}.pkg" 2>/dev/null \
          || productbuild \
            --package "$RUNNER_TEMP/wsjtx-component.pkg" \
            "wsjtx-${WSJTX_VERSION}-arm64-macOS.pkg"

          # Also sign if productbuild didn't handle it
          codesign --force --timestamp --sign "$IDENTITY" "wsjtx-${WSJTX_VERSION}-arm64-macOS.pkg" 2>/dev/null || true

      - name: Create DMG
        run: |
          hdiutil create -volname "WSJT-X ${WSJTX_VERSION} arm64" \
            -srcfolder "${{ steps.collect.outputs.stage_dir }}" \
            -ov -format UDZO \
            "${{ steps.collect.outputs.dmg_name }}"

      - name: Sign DMG
        run: |
          codesign --force --timestamp --sign "${{ steps.keychain.outputs.identity }}" \
            "${{ steps.collect.outputs.dmg_name }}"

      - name: Notarize DMG and pkg
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          notarize_and_staple() {
            local file="$1"
            echo "Notarizing: $file"
            xcrun notarytool submit "$file" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_ID_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait 2>&1 | tee notarize.log

            if grep -q "status: Invalid" notarize.log; then
              SUBMISSION_ID=$(grep "id:" notarize.log | head -1 | awk '{print $2}')
              echo "Notarization failed for $file. Fetching log..."
              xcrun notarytool log "$SUBMISSION_ID" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_ID_PASSWORD" \
                --team-id "$APPLE_TEAM_ID" || true
              exit 1
            fi

            xcrun stapler staple "$file"
          }

          notarize_and_staple "${{ steps.collect.outputs.dmg_name }}"
          notarize_and_staple "wsjtx-${WSJTX_VERSION}-arm64-macOS.pkg"

      - name: Notarize CLI tools
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ASSETS="${{ steps.collect.outputs.assets_dir }}"
          zip -r cli-tools.zip "${ASSETS}"/
          xcrun notarytool submit cli-tools.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait 2>&1 | tee notarize-cli.log

          if grep -q "status: Invalid" notarize-cli.log; then
            SUBMISSION_ID=$(grep "id:" notarize-cli.log | head -1 | awk '{print $2}')
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_ID_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" || true
            exit 1
          fi
          rm cli-tools.zip

      - name: Clean up keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/signing.keychain-db" 2>/dev/null || true

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.collect.outputs.dmg_name }}
          path: ${{ steps.collect.outputs.dmg_name }}

      - name: Upload pkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: wsjtx-${{ env.WSJTX_VERSION }}-arm64-macOS.pkg
          path: wsjtx-${{ env.WSJTX_VERSION }}-arm64-macOS.pkg

      - name: Package individual binaries
        run: |
          ASSETS="${{ steps.collect.outputs.assets_dir }}"
          PKGS=packages
          mkdir -p "${PKGS}"

          for bin in "${ASSETS}"/*; do
            [ -f "$bin" ] && [ -x "$bin" ] || continue
            name=$(basename "$bin")
            dir="${PKGS}/${name}"
            mkdir -p "${dir}"
            cp "$bin" "${dir}/"
            [ -d "${ASSETS}/lib" ] && cp -R "${ASSETS}/lib" "${dir}/lib"
            tar -czf "${PKGS}/${name}.tar.gz" -C "${PKGS}" "${name}"
            rm -rf "${dir}"
          done

      - name: Upload individual binaries
        uses: actions/upload-artifact@v4
        with:
          name: individual-binaries
          path: packages/*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Versioned release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.WSJTX_VERSION }}
          name: WSJT-X ${{ env.WSJTX_VERSION }} — arm64 macOS
          body: |
            Native Apple Silicon (arm64) build of WSJT-X ${{ env.WSJTX_VERSION }} for macOS.

            ## Downloads

            | File | Description |
            |------|-------------|
            | `wsjtx-${{ env.WSJTX_VERSION }}-arm64-macOS.pkg` | **Installer (recommended)** — installs app, CLI tools, and shared memory config |
            | `wsjtx-${{ env.WSJTX_VERSION }}-arm64-macOS.dmg` | DMG with app + all tools (manual install) |
            | `jt9.tar.gz` | JT9/FT8/FT4/Q65 decoder |
            | `wsprd.tar.gz` | WSPR decoder |
            | `ft8code.tar.gz` | FT8 encoder/decoder |
            | `jt65code.tar.gz` | JT65 encoder/decoder |
            | `q65code.tar.gz` | Q65 encoder/decoder |
            | `jt4code.tar.gz` | JT4 encoder/decoder |
            | `wsprcode.tar.gz` | WSPR encoder/decoder |
            | `encode77.tar.gz` | 77-bit message encoder |

            Signed with Developer ID and notarized by Apple. Built on GitHub Actions macOS 15 (Apple Silicon).
          draft: false
          prerelease: ${{ contains(env.WSJTX_VERSION, 'rc') }}
          files: |
            **/*.dmg
            **/*.pkg
            individual-binaries/*.tar.gz

      - name: Latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build — arm64 macOS
          body: |
            **Always points to the newest build.** Currently WSJT-X ${{ env.WSJTX_VERSION }}.

            Grab individual tools directly:
            ```
            curl -LO https://github.com/KJ5HST-LABS/WSJT-X-MAC-ARM64/releases/download/latest/jt9.tar.gz
            tar xzf jt9.tar.gz
            ```

            | File | Description |
            |------|-------------|
            | `wsjtx-${{ env.WSJTX_VERSION }}-arm64-macOS.pkg` | **Installer (recommended)** — installs app, CLI tools, and shared memory config |
            | `wsjtx-${{ env.WSJTX_VERSION }}-arm64-macOS.dmg` | DMG with app + all tools (manual install) |
            | `jt9.tar.gz` | JT9/FT8/FT4/Q65 decoder |
            | `wsprd.tar.gz` | WSPR decoder |
            | `ft8code.tar.gz` | FT8 encoder/decoder |
            | `jt65code.tar.gz` | JT65 encoder/decoder |
            | `q65code.tar.gz` | Q65 encoder/decoder |
            | `jt4code.tar.gz` | JT4 encoder/decoder |
            | `wsprcode.tar.gz` | WSPR encoder/decoder |
            | `encode77.tar.gz` | 77-bit message encoder |

            Signed with Developer ID and notarized by Apple.
          make_latest: true
          draft: false
          prerelease: false
          files: |
            **/*.dmg
            **/*.pkg
            individual-binaries/*.tar.gz
